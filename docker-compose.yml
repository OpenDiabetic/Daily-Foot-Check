# Daily Foot Check — run a Foot Check Node.
#
#   Plain HTTP (localhost / same-device):   docker compose up -d
#   HTTPS for LAN phones (camera-capable):  docker compose --profile https up -d
#
# The container only SERVES static files. It never receives your photos —
# capture, comparison, and history all stay in the browser, on the device.

services:
  # --- default: simple static server over HTTP on :8080 ---
  footcheck:
    image: nginx:alpine
    container_name: foot-check-node
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/usr/share/nginx/html:ro

  # --- optional: HTTPS via Caddy with an internal cert (needed so phones on
  #     your LAN can use the camera). Enable with:  --profile https ---
  footcheck-https:
    image: caddy:alpine
    container_name: foot-check-node-https
    restart: unless-stopped
    profiles: ["https"]
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./:/srv:ro
      - caddy_data:/data

volumes:
  caddy_data:
