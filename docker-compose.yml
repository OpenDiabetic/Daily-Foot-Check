# footcheck-node — 5090 serving rig
# Zero-retention is enforced HERE, not just promised in code:
#   read_only + tmpfs on every container that ever touches an image.
services:

  medgemma:
    image: vllm/vllm-openai:latest
    command: >
      --model google/medgemma-1.5-4b-it
      --gpu-memory-utilization 0.85
      --max-model-len 8192
      --disable-log-requests
      --port 8000
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - hf-cache:/root/.cache/huggingface   # model weights only — no PHI ever
    tmpfs:
      - /tmp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request as u; u.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 300s
    restart: unless-stopped

  api:
    build: .
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - FOOTCHECK_VLLM_BASE_URL=http://medgemma:8000/v1
      - FOOTCHECK_ANCHOR_ENABLED=${FOOTCHECK_ANCHOR_ENABLED:-false}
      - FOOTCHECK_HEDERA_TOPIC_ID=${FOOTCHECK_HEDERA_TOPIC_ID:-}
      - FOOTCHECK_HEDERA_OPERATOR_ID=${FOOTCHECK_HEDERA_OPERATOR_ID:-}
      - FOOTCHECK_HEDERA_OPERATOR_KEY=${FOOTCHECK_HEDERA_OPERATOR_KEY:-}
    depends_on:
      medgemma:
        condition: service_healthy
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hf-cache:
  caddy-data:
  caddy-config:
